version: 2
project_name: claude-gatekeeper

builds:
  - main: ./cmd/claude-gatekeeper
    binary: bin/claude-gatekeeper
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - hooks/**
      - .claude-plugin/**
      - bin/run.sh
      - bin/run.ps1
      - bin/install.sh
      - gatekeeper.toml
      - README.md
      - LICENSE
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  use: github-native
