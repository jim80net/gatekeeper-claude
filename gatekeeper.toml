input  = '(?:^|[|;&]\s*)(?:uv|pip|pip3|pytest|python|python3|ruff|mypy|black|isort|poetry)\s'
decision = "allow"
reason = "Python toolchain"

# =============================================================================
# ALLOW — Safe shell utilities
# =============================================================================

[[rules]]
tool   = 'Bash'
input  = '(?:^|[|;&]\s*)(?:ls|find|mkdir|curl|wget|diff|wc|cat|head|tail|echo|printf|touch|cp|mv|chmod|which|env|sort|uniq|tee|xargs|tr|cut|basename|dirname|realpath|readlink|stat|file|date|whoami|hostname|uname|id|test|true|false|yes|seq|comm|paste|column|fmt|fold|expand|unexpand|nl|od|hexdump|md5sum|sha256sum|sha1sum|b2sum|cksum|nproc|getconf|free|df|du|uptime)(?:\s|$)'
decision = "allow"
reason = "Safe shell utility"

# =============================================================================
# ALLOW — Go toolchain
# =============================================================================

[[rules]]
tool   = 'Bash'
input  = '(?:^|[|;&]\s*)(?:go|gofmt|goimports|golangci-lint|staticcheck|dlv|gopls|govulncheck)(?:\s|$)'
decision = "allow"
reason = "Go toolchain"

# =============================================================================
# ALLOW — pnpm
# =============================================================================

[[rules]]
tool   = 'Bash'
input  = '(?:^|[|;&]\s*)pnpm\s'
decision = "allow"
reason = "pnpm package manager"

# =============================================================================
# ALLOW — Build systems
# =============================================================================

[[rules]]
tool   = 'Bash'
input  = '(?:^|[|;&]\s*)(?:make|cmake|ninja|gradle|gradlew|cargo|mvn|bazel|buck|scons|meson)(?:\s|$)'
decision = "allow"
reason = "Build system"

# =============================================================================
# ALLOW — OpenSSL
# =============================================================================

[[rules]]
tool   = 'Bash'
input  = '(?:^|[|;&]\s*)openssl\s'
decision = "allow"
reason = "OpenSSL"

# =============================================================================
# ALLOW — JavaScript / TypeScript dev tools
# =============================================================================

[[rules]]
tool   = 'Bash'
input  = '(?:^|[|;&]\s*)(?:node|npx|tsc|eslint|prettier|vitest|jest|playwright|webpack|vite|esbuild|rollup|turbo|tsx|ts-node|bunx|bun)(?:\s|$)'
decision = "allow"
reason = "JavaScript/TypeScript tools"

# =============================================================================
# ALLOW — timeout wrapper (often prefixed to other commands)
# =============================================================================

[[rules]]
tool   = 'Bash'
input  = '^timeout\s'
decision = "allow"
reason = "Timeout wrapper"

# =============================================================================
# ALLOW — Common developer utilities
# =============================================================================

[[rules]]
tool   = 'Bash'
input  = '(?:^|[|;&]\s*)(?:jq|yq|tree|ag|rg|fzf|bat|fd|eza|htop|top|ps|kill|lsof|nc|dig|nslookup|ping|traceroute|ssh-keygen|gpg|base64|tar|gzip|gunzip|zip|unzip|xz)(?:\s|$)'
decision = "allow"
reason = "Developer utility"

# =============================================================================
# ALLOW — Infrastructure / cloud tools
# =============================================================================

[[rules]]
tool   = 'Bash'
input  = '(?:^|[|;&]\s*)(?:terraform|tf|terragrunt|kubectl|helm|pulumi|aws|gcloud|az)(?:\s|$)'
decision = "allow"
reason = "Infrastructure/cloud tool"

# =============================================================================
# ALLOW — Non-Bash tools (file browsing, editing, web, agents)
# =============================================================================

[[rules]]
tool   = 'Read|Glob|Grep'
input  = '.*'
decision = "allow"
reason = "File browsing"

[[rules]]
tool   = 'Edit|Write'
input  = '.*'
decision = "allow"
reason = "File editing"

[[rules]]
tool   = 'WebFetch|WebSearch'
input  = '.*'
decision = "allow"
reason = "Web access"

[[rules]]
tool   = 'Agent'
input  = '.*'
decision = "allow"
reason = "Subagent"
